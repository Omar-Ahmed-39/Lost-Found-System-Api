services:
  db: 
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lostAndFoundDb
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperSecretP@ssw0rd!
    ports:
      - "2020:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "SuperSecretP@ssw0rd!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - sql_data:/var/opt/mssql
  
  migration:
    build:
      context: .
      dockerfile: Dockerfile.migration
    container_name: lostAndFoundMigration
    depends_on:
      db:
        condition: service_healthy
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lostAndFoundApi
    ports:
      - "8080:8080" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=LostAndFoundDb;User Id=sa;Password=SuperSecretP@ssw0rd!;TrustServerCertificate=True;
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      migration:
        condition: service_completed_successfully
  
volumes:
  sql_data: